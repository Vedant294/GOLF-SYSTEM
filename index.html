<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="India's first golf charity subscription. Your Stableford scores become lucky draw numbers — win real money while feeding children, protecting elders, and changing lives." />
    <meta name="keywords" content="golf subscription, charity golf, prize draw, Stableford, India golf, golf charity" />
    <meta property="og:title" content="Golff — Play Golf. Win Prizes. Change Lives." />
    <meta property="og:description" content="India's first golf charity subscription with monthly prize draws." />
    <title>Golff — Play. Win. Give.</title>
    <!-- Premium Font Stack -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <div id="loading-screen" style="position: fixed; inset: 0; background: #0A0A0F; display: flex; align-items: center; justify-content: center; z-index: 9999;">
      <div style="text-align: center;">
        <div style="width: 60px; height: 60px; border: 4px solid #1A1A2E; border-top: 4px solid #6EE7B7; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
        <p style="color: #6EE7B7; font-family: system-ui; font-size: 18px; font-weight: 600;">Loading Golff...</p>
      </div>
    </div>
    <style>
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const loader = document.getElementById('loading-screen');
          if (loader) loader.style.display = 'none';
        }, 500);
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
